name: tic-tac-toe-agent
version: 1.0.0
description: Distributable Tic-Tac-Toe agent package built with GitHub Copilot agentic primitives and context engineering.

scripts:
  tic-tac-toe: "copilot --log-level all --log-dir copilot-logs --allow-all-tools -p .apm/prompts/tic-tac-toe.prompt.md"
  tic-tac-toe-debug: "copilot --experimental --log-level all --log-dir copilot-logs --allow-all-tools -p .apm/prompts/tic-tac-toe.prompt.md"